# ══════════════════════════════════════════════════════════════════════
#  Geny — Docker Compose (Development / Core — 경량 버전)
#
#  TTS 로컬 엔진 없이 핵심 서비스만 실행합니다.
#  소스 코드가 바인드 마운트되어 로컬 편집이 컨테이너에 즉시 반영됩니다.
#
#  - Backend : uvicorn --reload (watchfiles 기반 hot reload)
#  - Frontend: next dev (HMR / Fast Refresh)
#
#  Usage:
#    docker compose -f docker-compose.dev-core.yml up --build
#    docker compose -f docker-compose.dev-core.yml up -d
#    docker compose -f docker-compose.dev-core.yml down
#    docker compose -f docker-compose.dev-core.yml logs -f
#
#  전체 버전 (TTS 포함):
#    docker compose -f docker-compose.dev.yml up --build
# ══════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL Database ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: geny-postgres-dev
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-geny}
      POSTGRES_USER: ${POSTGRES_USER:-geny}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geny123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      TZ: ${TIMEZONE:-Asia/Seoul}
    volumes:
      - geny-pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-geny} -d ${POSTGRES_DB:-geny}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - geny-net-dev

  # ── Backend (FastAPI + LangGraph + Claude CLI) — Dev Mode ─────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: geny-backend-dev
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - DEBUG_MODE=true
      - GENY_AGENT_STORAGE_ROOT=/data/geny_agent_sessions
      # PostgreSQL
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-geny}
      - POSTGRES_USER=${POSTGRES_USER:-geny}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-geny123}
      - AUTO_MIGRATION=true
      - TIMEZONE=${TIMEZONE:-Asia/Seoul}
      # MemoryProvider (Phase 2) — unset / "disabled" keeps registry dormant.
      - MEMORY_PROVIDER=${MEMORY_PROVIDER:-}
      - MEMORY_DSN=${MEMORY_DSN:-}
      - MEMORY_DIALECT=${MEMORY_DIALECT:-}
      - MEMORY_ROOT=${MEMORY_ROOT:-}
      - MEMORY_SCOPE=${MEMORY_SCOPE:-session}
      - MEMORY_TIMEZONE=${MEMORY_TIMEZONE:-}
    volumes:
      # ── Bind mount: 로컬 소스 ↔ 컨테이너 동기화 ──────────────────
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - geny-net-dev

  # ── Frontend (Next.js) — Dev Mode ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: geny-frontend-dev
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - API_URL=http://backend:8000
      - NEXT_PUBLIC_BACKEND_PORT=${BACKEND_PORT:-8000}
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    volumes:
      # ── Bind mount: 로컬 소스 ↔ 컨테이너 동기화 ──────────────────
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/next.config.ts:/app/next.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/postcss.config.mjs:/app/postcss.config.mjs
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - geny-net-dev

networks:
  geny-net-dev:
    driver: bridge

volumes:
  geny-pgdata-dev:
    driver: local
