# ══════════════════════════════════════════════════════════════════════
#  Geny — Docker Compose (Development / Full)
#
#  소스 코드가 바인드 마운트되어 로컬 편집이 컨테이너에 즉시 반영됩니다.
#  TTS 로컬 엔진은 --profile tts-local 로 활성화할 수 있습니다.
#
#  - Backend : uvicorn --reload (watchfiles 기반 hot reload)
#  - Frontend: next dev (HMR / Fast Refresh)
#
#  Usage:
#    docker compose -f docker-compose.dev.yml up --build
#    docker compose -f docker-compose.dev.yml --profile tts-local up --build
#    docker compose -f docker-compose.dev.yml down
#    docker compose -f docker-compose.dev.yml logs -f
#
#  경량 버전 (TTS 없음):
#    docker compose -f docker-compose.dev-core.yml up --build
#
#  TTS 설정:
#    GPT-SoVITS API URL → 설정 UI에서 http://gpt-sovits:9871 입력
#    Fish Speech API URL → 설정 UI에서 http://fish-speech:8080 입력
# ══════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL Database ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: geny-postgres-dev
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-geny}
      POSTGRES_USER: ${POSTGRES_USER:-geny}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geny123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      TZ: ${TIMEZONE:-Asia/Seoul}
    volumes:
      - geny-pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-geny} -d ${POSTGRES_DB:-geny}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - geny-net-dev

  # ── Backend (FastAPI + LangGraph + Claude CLI) — Dev Mode ─────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: geny-backend-dev
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - DEBUG_MODE=true
      - GENY_AGENT_STORAGE_ROOT=/data/geny_agent_sessions
      # PostgreSQL
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-geny}
      - POSTGRES_USER=${POSTGRES_USER:-geny}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-geny123}
      - AUTO_MIGRATION=true
      - TIMEZONE=${TIMEZONE:-Asia/Seoul}
    volumes:
      # ── Bind mount: 로컬 소스 ↔ 컨테이너 동기화 ──────────────────
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - geny-net-dev

  # ── Frontend (Next.js) — Dev Mode ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: geny-frontend-dev
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - API_URL=http://backend:8000
      - NEXT_PUBLIC_BACKEND_PORT=${BACKEND_PORT:-8000}
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    volumes:
      # ── Bind mount: 로컬 소스 ↔ 컨테이너 동기화 ──────────────────
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/next.config.ts:/app/next.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/postcss.config.mjs:/app/postcss.config.mjs
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - geny-net-dev

  # ── GPT-SoVITS (Optional — TTS 로컬 엔진, GPU 필요) ──────────────
  gpt-sovits:
    image: breakstring/gpt-sovits:latest
    container_name: geny-gpt-sovits-dev
    profiles: ["tts-local"]
    restart: unless-stopped
    ports:
      - "${GPT_SOVITS_PORT:-9871}:9871"
    volumes:
      - ./backend/static/voices:/app/references:ro
      - gpt-sovits-models-dev:/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - is_half=True
    networks:
      - geny-net-dev

  # ── Fish Speech (Optional — TTS 로컬 엔진, GPU 필요) ──────────────
  fish-speech:
    image: fishaudio/fish-speech:latest
    container_name: geny-fish-speech-dev
    profiles: ["tts-local"]
    restart: unless-stopped
    ports:
      - "${FISH_SPEECH_PORT:-8080}:8080"
    volumes:
      - fish-speech-models-dev:/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - geny-net-dev

networks:
  geny-net-dev:
    driver: bridge

volumes:
  geny-pgdata-dev:
    driver: local
  gpt-sovits-models-dev:
    driver: local
  fish-speech-models-dev:
    driver: local
