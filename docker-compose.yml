# ══════════════════════════════════════════════════════════════════════
#  Geny — Docker Compose
#
#  Usage:
#    docker compose up --build              # 빌드 + 실행
#    docker compose up -d                   # 백그라운드 실행
#    docker compose down                    # 종료
#    docker compose logs -f                 # 로그 확인
#
#  Port 변경:
#    BACKEND_PORT=8080 FRONTEND_PORT=3001 docker compose up --build
#
#  또는 .env 파일로 설정:
#    BACKEND_PORT=8080
#    FRONTEND_PORT=3001
# ══════════════════════════════════════════════════════════════════════

services:

  # ── Backend (FastAPI + LangGraph + Claude CLI) ────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: geny-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      # Override port/host inside container (always 8000 internally)
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - GENY_AGENT_STORAGE_ROOT=/data/geny_agent_sessions
    volumes:
      # ── Agent session storage ──────────────────────────────────────
      # 세션이 작업하는 워크스페이스 디렉토리. 호스트에서 직접 확인 가능.
      # Host: ./data/geny_agent_sessions  →  Container: /data/geny_agent_sessions
      - ./data/geny_agent_sessions:/data/geny_agent_sessions

      # ── Session metadata (sessions.json) ───────────────────────────
      # 세션 메타정보 파일. 컨테이너 재시작해도 세션 목록 유지.
      # Host: ./data/sessions.json  →  Container 내부 sessions.json
      - ./data/sessions.json:/app/service/claude_manager/sessions.json

      # ── Backend logs ───────────────────────────────────────────────
      # 세션별 실행 로그. 호스트에서 직접 tail 가능.
      # Host: ./data/logs  →  Container: /app/logs
      - ./data/logs:/app/logs

      # ── MCP configs (live-reload) ──────────────────────────────────
      # MCP 서버 설정 파일. 호스트에서 추가/수정하면 즉시 반영.
      - ./backend/mcp:/app/mcp

      # ── Workflow files ─────────────────────────────────────────────
      - ./backend/workflows:/app/workflows

      # ── Tool presets ───────────────────────────────────────────────
      - ./backend/tool_presets:/app/tool_presets

      # ── Prompt templates ───────────────────────────────────────────
      - ./backend/prompts:/app/prompts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - geny-net

  # ── Frontend (Next.js) ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: geny-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      # Next.js rewrites proxy → backend container
      - API_URL=http://backend:8000
      - PORT=3000
      - HOSTNAME=0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - geny-net

  # ── Redis (optional — enable for multi-pod) ───────────────────────
  # Uncomment below if you set USE_REDIS=true in backend/.env
  #
  # redis:
  #   image: redis:7-alpine
  #   container_name: geny-redis
  #   restart: unless-stopped
  #   ports:
  #     - "${REDIS_PORT:-6379}:6379"
  #   volumes:
  #     - redis-data:/data
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 3
  #   networks:
  #     - geny-net

networks:
  geny-net:
    driver: bridge

# Uncomment if using Redis
# volumes:
#   redis-data:
